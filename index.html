<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Voice — Web Client v2 (NVIDIA)</title>
  <style>
    :root{--bg:#0b1220;--panel:#0f172a;--text:#e5e7eb;--muted:#9ca3af;--brand:#22c55e;--accent:#60a5fa;--danger:#ef4444}
    html,body{height:100%}
    body{margin:0;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center}
    .card{width:min(900px,95vw);background:var(--panel);border:1px solid #1f2937;border-radius:14px;padding:22px 20px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{margin:0 0 6px 0} p{margin:.2rem 0 .8rem 0;color:var(--muted)}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin:.5rem 0 1rem}
    input[type=url],textarea{flex:1;min-width:260px;padding:10px 12px;border-radius:10px;border:1px solid #374151;background:#0b1220;color:var(--text)}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:600;cursor:pointer}
    .rec{background:var(--brand);color:#052012}.stop{background:var(--danger);color:#2b0b0b}.send{background:var(--accent);color:#08192c}
    .log{background:#0b1220;border:1px solid #1f2937;border-radius:10px;padding:10px;height:210px;overflow:auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;white-space:pre-wrap}
    .hint{font-size:13px;color:var(--muted)} .chat{display:flex;gap:10px} .chat textarea{min-height:64px}
  </style>
</head>
<body>
  <div class="card">
    <h1>AI Voice — Web Client v2 (NVIDIA)</h1>
    <p>Press <b>Record</b>, speak. The browser transcribes locally. We send text to your NVIDIA gateway <code>/chat</code> and speak the reply.</p>

    <div class="row">
      <input id="server" type="url" placeholder="https://YOUR-NIM-GATEWAY.onrender.com" />
      <button class="rec" id="recBtn">Record</button>
      <button class="stop" id="stopBtn" disabled>Stop</button>
      <button class="send" id="sendBtn" disabled>Send</button>
    </div>

    <div class="chat">
      <textarea id="inputText" placeholder="Or type your question here..."></textarea>
    </div>

    <div class="hint">Note: Voice recognition & speech synthesis use your browser (free). Replies come from NVIDIA NIM via your gateway.</div>

    <div class="log" id="log"></div>
  </div>

<script>
(() => {
  const logEl = document.getElementById('log');
  const recBtn = document.getElementById('recBtn');
  const stopBtn = document.getElementById('stopBtn');
  const sendBtn = document.getElementById('sendBtn');
  const serverInput = document.getElementById('server');
  const inputText = document.getElementById('inputText');

  let recog = null;
  let transcript = '';

  function log(msg){
    const ts = new Date().toLocaleTimeString();
    logEl.textContent += `[${ts}] ${msg}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  function supportsWebSpeech(){
    return ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window);
  }

  function speak(text){
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }

  function startRec(){
    if (!supportsWebSpeech()){ log('❌ Browser does not support SpeechRecognition. Type your question and press Send.'); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recog = new SR();
    recog.lang = 'en-US';
    recog.interimResults = true;
    transcript = '';
    recog.onstart = () => log('🎙️ Listening...');
    recog.onresult = (ev) => {
