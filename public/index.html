<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Voice</title>
  <style>
    /* Keep your existing background color */
    :root { --bg:#0b1220; --ring:#60a5fa; --speak:#22c55e; --muted:#90a4b8; }
    html,body { height:100%; margin:0; background:var(--bg); color:#e5e7eb; }

    /* Fullscreen stage with a single avatar */
    .stage { height:100%; display:flex; align-items:center; justify-content:center; }

    /* Avatar: responsive “normal” size */
    .avatar {
      width:min(40vh, 46vw); aspect-ratio:1/1; position:relative;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,.45));
      animation: breathe 4s ease-in-out infinite;
      transition: transform .2s ease;
      user-select:none; -webkit-user-select:none; touch-action:manipulation;
    }
    @keyframes breathe {
      0%,100%{transform:translateY(0) scale(1);}
      50%    {transform:translateY(-2px) scale(1.01);}
    }

    /* Listening / asking / speaking ring */
    .ring { position:absolute; inset:-10%; border-radius:50%; opacity:0; pointer-events:none; }
    .listening .ring { opacity:.65; animation:ring 1.4s ease-out infinite; }
    .asking .ring    { opacity:.9;  animation:ringActive 0.9s ease-out infinite; }
    .speaking .ring  { opacity:.95; animation:speakPulse .6s ease-in-out infinite; }

    @keyframes ring {
      0%{ box-shadow:0 0 0 0 rgba(96,165,250,.40); }
      100%{ box-shadow:0 0 0 26px rgba(96,165,250,0); }
    }
    @keyframes ringActive {
      0%{   box-shadow:0 0 0 6px  rgba(96,165,250,.65); }
      100%{ box-shadow:0 0 0 14px rgba(96,165,250,0.10); }
    }
    @keyframes speakPulse {
      0%,100%{ box-shadow:0 0 0 4px  rgba(34,197,94,.45); }
      50%    { box-shadow:0 0 0 10px rgba(34,197,94,.15); }
    }

    /* Cartoon “smart” avatar (glasses + tie) */
    svg { width:100%; height:100%; display:block; }
    .head  { fill:#14223a; stroke:#1f2f50; stroke-width:2; }
    .face  { fill:#0f1a2b; }
    .eye   { fill:#e5e7eb; }
    .pupil { fill:#0b1220; }
    .lid   { fill:#0b1220; transform-origin:50% 50%; }
    .blink .lid { animation:blink 6s infinite; }
    @keyframes blink { 0%,97%,100%{transform:scaleY(0);} 98%{transform:scaleY(1);} }
    .frame { stroke:#6aa9ff; stroke-width:3; fill:none; }
    .bridge{ stroke:#6aa9ff; stroke-width:3; }
    .brow  { stroke:#2a3a59; stroke-width:3; stroke-linecap:round; }
    .mouth { fill:#ef4444; transform-origin:50% 60%; }
    .speaking .mouth { animation:talk .22s ease-in-out infinite; }
    @keyframes talk { 0%,100%{transform:scaleY(.5);} 50%{transform:scaleY(1.12);} }
    .shirt { fill:#1b2a46; }
    .collar{ fill:#1d2f53; }
    .tie   { fill:#3b82f6; }

    /* Speaking loader (appears under avatar while audio is playing) */
    .loader {
      position:absolute; left:50%; bottom:-44px; transform:translateX(-50%);
      display:none; gap:7px; align-items:flex-end;
    }
    .speaking + .loader, .avatar.speaking .loader { display:flex; } /* ensure visible when speaking */

    .dot {
      width:8px; height:8px; border-radius:50%; background:#22c55e;
      animation:bounce 900ms infinite ease-in-out;
    }
    .dot:nth-child(2){ animation-delay:120ms; }
    .dot:nth-child(3){ animation-delay:240ms; }
    @keyframes bounce {
      0%,100%{ transform:translateY(0); opacity:.5; }
      50%    { transform:translateY(-8px); opacity:1; }
    }

    /* Accessibility-only region (no visible text) */
    .sr-only { position:absolute; clip:rect(0 0 0 0); clip-path:inset(50%);
               width:1px; height:1px; overflow:hidden; white-space:nowrap; border:0; }
  </style>
</head>
<body>
  <main class="stage" aria-label="Voice assistant scene">
    <div id="avatar" class="avatar blink" aria-live="polite">
      <div class="ring"></div>
      <svg viewBox="0 0 200 220" role="img" aria-hidden="true">
        <defs>
          <radialGradient id="shine" cx="30%" cy="25%" r="70%">
            <stop offset="0%" stop-color="#1c2945"/>
            <stop offset="100%" stop-color="#0f1a2b"/>
          </radialGradient>
        </defs>
        <!-- Head + face -->
        <circle class="head" cx="100" cy="95" r="82"/>
        <circle class="face" cx="100" cy="95" r="74" fill="url(#shine)"/>
        <!-- Eyes -->
        <ellipse class="eye" cx="70" cy="85" rx="14" ry="10"/>
        <circle  class="pupil" cx="70" cy="85" r="5"/>
        <ellipse class="eye" cx="130" cy="85" rx="14" ry="10"/>
        <circle  class="pupil" cx="130" cy="85" r="5"/>
        <rect class="lid" x="56" y="80" width="28" height="10" rx="5" />
        <rect class="lid" x="116" y="80" width="28" height="10" rx="5" />
        <!-- Brows -->
        <path class="brow" d="M53,70 Q70,58 87,70"/>
        <path class="brow" d="M113,70 Q130,58 147,70"/>
        <!-- Glasses -->
        <ellipse class="frame" cx="70" cy="85" rx="18" ry="12"/>
        <ellipse class="frame" cx="130" cy="85" rx="18" ry="12"/>
        <line class="bridge" x1="88" y1="85" x2="112" y2="85"/>
        <!-- Mouth -->
        <ellipse class="mouth" cx="100" cy="125" rx="18" ry="6"/>
        <!-- Shoulders + tie -->
        <path class="shirt" d="M40,180 Q100,150 160,180 L160,210 L40,210 Z"/>
        <path class="collar" d="M75,170 L100,158 L125,170 L100,176 Z"/>
        <polygon class="tie" points="100,176 108,194 100,210 92,194"/>
      </svg>
      <!-- speaking loader (three dots) -->
      <div class="loader" aria-hidden="true">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
    <p id="live" class="sr-only"></p>
  </main>

<script>
(() => {
  /* ===== Config ===== */
  const CHAT_URL   = location.origin.replace(/\/$/,'') + '/chat';
  const LANG       = 'en-US';
  const WAKE_WORD  = 'hello';
  const BEEP_FREQ  = 880, BEEP_MS = 140;
  const SILENCE_MS = 5000;   // finalize after 5s of silence

  /* ===== DOM ===== */
  const avatar = document.getElementById('avatar');
  const live   = document.getElementById('live');

  /* ===== Audio (beep) ===== */
  let audioCtx = null;
  async function ensureAudio(){
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') { try{ await audioCtx.resume(); }catch{} }
  }
  async function beep(freq=BEEP_FREQ, ms=BEEP_MS, vol=0.28){
    try{
      await ensureAudio();
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.type='sine'; osc.frequency.value=freq; g.gain.value = vol;
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(); setTimeout(()=>{ try{osc.stop();}catch{} }, ms);
    }catch(e){ /* ignore if audio blocked */ }
  }

  /* ===== Speech ===== */
  const SR     = window.SpeechRecognition || window.webkitSpeechRecognition;
  const hasTTS = 'speechSynthesis' in window;

  let recog=null, speaking=false, listening=false;
  let activated=false, buffer='', idleTimer=null;

  function setListening(on){ avatar.classList.toggle('listening', !!on); listening = !!on; }
  function setAsking(on){ avatar.classList.toggle('asking', !!on); }
  function setSpeaking(on){ avatar.classList.toggle('speaking', !!on); speaking = !!on; }

  function speak(text){
    if (!hasTTS || !text) return;
    try{
      // stop recognizer to avoid echo pickup, resume after speech
      stopRecognition();
      setSpeaking(true);
      const u = new SpeechSynthesisUtterance(text);
      u.lang = LANG;
      u.rate = 1; u.pitch = 1; // more natural; tweak if needed
      u.onend = () => { setSpeaking(false); tryStart(); }; // reopen mic after answer
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
      live.textContent = text; // accessibility only
    }catch(e){ setSpeaking(false); tryStart(); }
  }

  async function askGateway(text){
    try{
      const res = await fetch(CHAT_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text })
      });
      const data = await res.json().catch(()=>({reply:''}));
      const reply = (data && data.reply) ? data.reply : '';
      if (reply) speak(reply);
      else       speak("I couldn't get an answer.");
    }catch(e){ speak('Sorry, I lost the connection.'); }
  }

  function armAsking(){ activated = true; buffer = ''; setAsking(true); }
  function disarmAsking(){ activated = false; setAsking(false); clearTimeout(idleTimer); idleTimer=null; }

  function finalizeIfNeeded(){
    if (!activated) return;
    const q = buffer.trim();
    disarmAsking();
    if (q) askGateway(q);
  }

  function resetIdleTimer(){
    clearTimeout(idleTimer);
    idleTimer = setTimeout(finalizeIfNeeded, SILENCE_MS);
  }

  function onFinalTranscript(phraseRaw){
    const phrase = (phraseRaw || '').trim();
    const lower  = phrase.toLowerCase();

    // Wake word detection
    const saidHello = lower === WAKE_WORD
      || lower.startsWith(WAKE_WORD+' ')
      || lower.endsWith(' '+WAKE_WORD)
      || lower.includes(' '+WAKE_WORD+' ');

    if (!activated && saidHello){
      beep();         // start cue
      armAsking();    // now show “asking / listening” state
      return;         // the next speech becomes the question buffer
    }

    // Accumulate question while armed; silence timer handles finalize
    if (activated){
      if (phrase) { buffer += (buffer ? ' ' : '') + phrase; }
      resetIdleTimer();
    }
  }

  function handleResults(ev){
    // Use both interim & final activity to keep the silence timer fresh
    if (activated) resetIdleTimer();
    let final = '';
    for (const r of ev.results){
      if (r.isFinal) final += (r[0].transcript + ' ');
    }
    if (final) onFinalTranscript(final);
  }

  function stopRecognition(){
    try{ recog && recog.stop(); }catch{}
    setListening(false);
  }

  function startRecognition(){
    if (!SR || speaking) return;
    try{
      recog = new SR();
      recog.lang = LANG;
      recog.continuous = true;
      recog.interimResults = true;
      recog.onstart  = () => setListening(true);
      recog.onend    = () => { setListening(false); if (!speaking) setTimeout(tryStart, 1200); };
      recog.onerror  = () => { setListening(false); if (!speaking) setTimeout(tryStart, 1800); };
      recog.onresult = handleResults;
      recog.start();
    }catch(e){
      // If permission not allowed, auto-retry later with no UI
      setTimeout(tryStart, 2000);
    }
  }

  function tryStart(){ if (!speaking) startRecognition(); }

  // Start idle listening immediately (no taps). If browser blocks mic, we silently retry.
  document.addEventListener('DOMContentLoaded', () => {
    tryStart();
  });
})();
</script>
</body>
</html>
