<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Voice</title>
  <style>
    /* Keep your existing background color */
    :root { --bg:#0b1220; --ring:#60a5fa; --speak:#22c55e; }
    html,body { height:100%; margin:0; background:var(--bg); color:#e5e7eb; }

    /* Fullscreen stage with a single avatar */
    .stage { height:100%; display:flex; align-items:center; justify-content:center; }

    /* Avatar: responsive “normal” size */
    .avatar {
      width:min(40vh, 46vw); aspect-ratio:1/1; position:relative;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,.45));
      animation: breathe 4s ease-in-out infinite;
      transition: transform .2s ease;
      user-select:none; -webkit-user-select:none; touch-action:manipulation;
    }
    @keyframes breathe { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-2px) scale(1.01);} }

    /* Listening/speaking ring */
    .ring {
      position:absolute; inset:-10%; border-radius:50%;
      box-shadow:0 0 0 0 var(--ring); opacity:0; pointer-events:none;
    }
    .listening .ring { animation:ring 1.2s ease-out infinite; opacity:.8; }
    @keyframes ring { 0%{box-shadow:0 0 0 0 rgba(96,165,250,.55);} 100%{box-shadow:0 0 0 26px rgba(96,165,250,0);} }
    .speaking .ring { animation:speakPulse .6s ease-in-out infinite; opacity:.95; }
    @keyframes speakPulse { 0%,100%{box-shadow:0 0 0 4px rgba(34,197,94,.45);} 50%{box-shadow:0 0 0 10px rgba(34,197,94,.15);} }

    /* Cartoon “smart” avatar (glasses + tie) */
    svg { width:100%; height:100%; display:block; }
    .head  { fill:#14223a; stroke:#1f2f50; stroke-width:2; }
    .face  { fill:#0f1a2b; }
    .eye   { fill:#e5e7eb; }
    .pupil { fill:#0b1220; }
    .lid   { fill:#0b1220; transform-origin:50% 50%; }
    .blink .lid { animation:blink 6s infinite; }
    @keyframes blink { 0%,97%,100%{transform:scaleY(0);} 98%{transform:scaleY(1);} }
    .frame { stroke:#6aa9ff; stroke-width:3; fill:none; }
    .bridge{ stroke:#6aa9ff; stroke-width:3; }
    .brow  { stroke:#2a3a59; stroke-width:3; stroke-linecap:round; }
    .mouth { fill:#ef4444; transform-origin:50% 60%; }
    .speaking .mouth { animation:talk .22s ease-in-out infinite; }
    @keyframes talk { 0%,100%{transform:scaleY(.5);} 50%{transform:scaleY(1.1);} }
    .shirt { fill:#1b2a46; }
    .collar{ fill:#1d2f53; }
    .tie   { fill:#3b82f6; }

    /* Accessibility-only region (no visible text) */
    .sr-only { position:absolute; clip:rect(0 0 0 0); clip-path:inset(50%);
               width:1px; height:1px; overflow:hidden; white-space:nowrap; border:0; }
  </style>
</head>
<body>
  <main class="stage" aria-label="Voice assistant scene">
    <div id="avatar" class="avatar blink" aria-live="polite">
      <div class="ring"></div>
      <svg viewBox="0 0 200 220" role="img" aria-hidden="true">
        <defs>
          <radialGradient id="shine" cx="30%" cy="25%" r="70%">
            <stop offset="0%" stop-color="#1c2945"/>
            <stop offset="100%" stop-color="#0f1a2b"/>
          </radialGradient>
        </defs>
        <!-- Head + face -->
        <circle class="head" cx="100" cy="95" r="82"/>
        <circle class="face" cx="100" cy="95" r="74" fill="url(#shine)"/>
        <!-- Eyes -->
        <ellipse class="eye" cx="70" cy="85" rx="14" ry="10"/>
        <circle  class="pupil" cx="70" cy="85" r="5"/>
        <ellipse class="eye" cx="130" cy="85" rx="14" ry="10"/>
        <circle  class="pupil" cx="130" cy="85" r="5"/>
        <rect class="lid" x="56" y="80" width="28" height="10" rx="5" />
        <rect class="lid" x="116" y="80" width="28" height="10" rx="5" />
        <!-- Brows -->
        <path class="brow" d="M53,70 Q70,58 87,70"/>
        <path class="brow" d="M113,70 Q130,58 147,70"/>
        <!-- Glasses -->
        <ellipse class="frame" cx="70" cy="85" rx="18" ry="12"/>
        <ellipse class="frame" cx="130" cy="85" rx="18" ry="12"/>
        <line class="bridge" x1="88" y1="85" x2="112" y2="85"/>
        <!-- Mouth -->
        <ellipse class="mouth" cx="100" cy="125" rx="18" ry="6"/>
        <!-- Shoulders + tie -->
        <path class="shirt" d="M40,180 Q100,150 160,180 L160,210 L40,210 Z"/>
        <path class="collar" d="M75,170 L100,158 L125,170 L100,176 Z"/>
        <polygon class="tie" points="100,176 108,194 100,210 92,194"/>
      </svg>
    </div>
    <p id="live" class="sr-only"></p>
  </main>

<script>
(() => {
  /* ========= Config ========= */
  const CHAT_URL   = location.origin.replace(/\/$/,'') + '/chat';
  const WAKE_WORD  = 'hello';        // 1) Say “Hello” to arm recording
  const BEEP_FREQ  = 880;            // Start cue beep
  const BEEP_MS    = 140;
  const LANG       = 'en-US';
  const SILENCE_MS = 5000;           // 2) 5s silence → finalize and answer

  /* ========= DOM ========= */
  const avatar = document.getElementById('avatar');
  const live   = document.getElementById('live');

  /* ========= Audio (beep) ========= */
  let audioCtx = null;
  async function beep(freq=BEEP_FREQ, ms=BEEP_MS, vol=0.25){
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain= audioCtx.createGain();
      osc.type='sine'; osc.frequency.value=freq; gain.gain.value=vol;
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); setTimeout(()=>{ try{osc.stop();}catch{} }, ms);
    }catch(e){ /* ignore autoplay errors */ }
  }

  /* ========= Speech ========= */
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const hasTTS = 'speechSynthesis' in window;

  let recog = null;
  let listening = false;
  let speaking  = false;

  let activated = false;      // were we armed by the “Hello” wake word?
  let buffer    = '';         // collected question after beep
  let idleTimer = null;       // silence timer after last speech

  function setListening(on){ avatar.classList.toggle('listening', !!on); listening = !!on; }
  function setSpeaking(on){ avatar.classList.toggle('speaking',  !!on); speaking  = !!on; }

  function speak(text){
    if (!hasTTS || !text) return;
    try{
      setSpeaking(true);
      const u = new SpeechSynthesisUtterance(text);
      u.lang = LANG;
      u.onend = () => { setSpeaking(false); tryStart(); }; // re-open mic after talking
      speechSynthesis.cancel(); speechSynthesis.speak(u);
      live.textContent = text; // accessibility only; no visible text
    }catch(e){ setSpeaking(false); }
  }

  async function askGateway(text){
    try{
      const res = await fetch(CHAT_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text })
      });
      const data  = await res.json().catch(()=>({reply:''}));
      const reply = (data && data.reply) ? data.reply : '';
      if (reply) speak(reply);
    }catch(e){ speak('Sorry, I lost the connection.'); }
  }

  function finalizeIfNeeded(){
    if (!activated) return;
    if (buffer.trim().length === 0) return; // nothing said after beep
    // Send the question and reset to need “Hello” again for the next one
    askGateway(buffer.trim());
    buffer = '';
    activated = false;
  }

  function resetIdleTimer(){
    clearTimeout(idleTimer);
    idleTimer = setTimeout(finalizeIfNeeded, SILENCE_MS);
  }

  function onFinalTranscript(phraseRaw){
    const phrase = (phraseRaw || '').trim();
    const lower  = phrase.toLowerCase();

    // 1) Wake on “hello” → beep → arm capture (no text displayed)
    const containsHello = lower === WAKE_WORD || lower.startsWith(WAKE_WORD+' ')
                       || lower.endsWith(' '+WAKE_WORD) || lower.includes(' '+WAKE_WORD+' ');
    if (!activated && containsHello){
      activated = true;
      buffer = '';
      beep();                // start cue (ask now)
      return;                // wait for the actual question
    }

    // 2) After wake, collect the user’s speech; 5s silence → finalize & answer
    if (activated){
      buffer += (buffer ? ' ' : '') + phrase;
      resetIdleTimer();
    }
  }

  function handleResults(ev){
    let final = '';
    for (const r of ev.results){
      if (r.isFinal) final += (r[0].transcript + ' ');
    }
    if (final) onFinalTranscript(final);
  }

  function stopRecognition(){
    try{ recog && recog.stop(); }catch{}
    setListening(false);
  }

  function startRecognition(){
    if (!SR) return;
    try{
      recog = new SR();
      recog.lang = LANG;
      recog.continuous = true;
      recog.interimResults = true;
      recog.onstart = () => setListening(true);
      recog.onend   = () => { setListening(false); if (!speaking) setTimeout(tryStart, 300); };
      recog.onerror = () => { setListening(false); if (!speaking) setTimeout(tryStart, 600); };
      recog.onresult= handleResults;
      recog.start();
    }catch(e){ /* needs a first user gesture in some browsers */ }
  }

  function tryStart(){
    if (speaking) return;     // don’t listen while TTS is speaking
    startRecognition();
  }

  // Auto-start; one tap anywhere provides the required user gesture if blocked
  document.addEventListener('DOMContentLoaded', () => {
    tryStart();
    // Retry on any single tap; also resume AudioContext for beep if suspended
    document.addEventListener('pointerdown', async () => {
      if (audioCtx && audioCtx.state === 'suspended') { try{ await audioCtx.resume(); }catch{} }
      tryStart();
    }, { passive:true, once:true });

    // If TTS starts, avoid feedback: stop the recognizer; it resumes on TTS end
    window.addEventListener('speechSynthesisUtteranceStart', stopRecognition);
  });
})();
</script>
</body>
</html>
