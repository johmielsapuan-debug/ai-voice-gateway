<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Voice</title>
  <style>
    :root { --bg:#0b1220; --ring:#60a5fa; --speak:#22c55e; --muted:#90a4b8; }
    html,body { height:100%; margin:0; background:var(--bg); color:#e5e7eb; }
    .stage { height:100%; display:flex; align-items:center; justify-content:center; }

    /* Avatar */
    .avatar {
      width:min(40vh, 46vw); aspect-ratio:1/1; position:relative;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,.45));
      animation: breathe 4s ease-in-out infinite;
      user-select:none; -webkit-user-select:none; touch-action:manipulation;
    }
    @keyframes breathe { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-2px) scale(1.01);} }

    /* Rings for states */
    .ring { position:absolute; inset:-10%; border-radius:50%; opacity:0; pointer-events:none; }
    .listening .ring { opacity:.65; animation:ring 1.4s ease-out infinite; }
    .asking .ring    { opacity:.9;  animation:ringActive .9s ease-out infinite; }
    .speaking .ring  { opacity:.95; animation:speakPulse .6s ease-in-out infinite; }
    @keyframes ring { 0%{box-shadow:0 0 0 0 rgba(96,165,250,.40);} 100%{box-shadow:0 0 0 26px rgba(96,165,250,0);} }
    @keyframes ringActive { 0%{box-shadow:0 0 0 6px rgba(96,165,250,.65);} 100%{box-shadow:0 0 0 14px rgba(96,165,250,0.10);} }
    @keyframes speakPulse { 0%,100%{box-shadow:0 0 0 4px rgba(34,197,94,.45);} 50%{box-shadow:0 0 0 10px rgba(34,197,94,.15);} }

    /* Cartoon “smart” avatar */
    svg { width:100%; height:100%; display:block; }
    .head  { fill:#14223a; stroke:#1f2f50; stroke-width:2; }
    .face  { fill:#0f1a2b; }
    .eye   { fill:#e5e7eb; }
    .pupil { fill:#0b1220; }
    .lid   { fill:#0b1220; transform-origin:50% 50%; }
    .blink .lid { animation:blink 6s infinite; }
    @keyframes blink { 0%,97%,100%{transform:scaleY(0);} 98%{transform:scaleY(1);} }
    .frame { stroke:#6aa9ff; stroke-width:3; fill:none; }
    .bridge{ stroke:#6aa9ff; stroke-width:3; }
    .brow  { stroke:#2a3a59; stroke-width:3; stroke-linecap:round; }
    .mouth { fill:#ef4444; transform-origin:50% 60%; }
    .speaking .mouth { animation:talk .22s ease-in-out infinite; }
    @keyframes talk { 0%,100%{transform:scaleY(.5);} 50%{transform:scaleY(1.12);} }
    .shirt { fill:#1b2a46; }
    .collar{ fill:#1d2f53; }
    .tie   { fill:#3b82f6; }

    /* Speaking loader */
    .loader {
      position:absolute; left:50%; bottom:-44px; transform:translateX(-50%);
      display:none; gap:7px; align-items:flex-end;
    }
    .avatar.speaking .loader { display:flex; }
    .dot { width:8px; height:8px; border-radius:50%; background:#22c55e; animation:bounce 900ms infinite ease-in-out; }
    .dot:nth-child(2){ animation-delay:120ms; } .dot:nth-child(3){ animation-delay:240ms; }
    @keyframes bounce { 0%,100%{ transform:translateY(0); opacity:.5; } 50%{ transform:translateY(-8px); opacity:1; } }

    .sr-only { position:absolute; clip:rect(0 0 0 0); clip-path:inset(50%); width:1px; height:1px; overflow:hidden; white-space:nowrap; border:0; }
  </style>
</head>
<body>
  <main class="stage" aria-label="Voice assistant">
    <div id="avatar" class="avatar blink listening" aria-live="polite">
      <div class="ring"></div>
      <svg viewBox="0 0 200 220" role="img" aria-hidden="true">
        <defs>
          <radialGradient id="shine" cx="30%" cy="25%" r="70%">
            <stop offset="0%" stop-color="#1c2945"/><stop offset="100%" stop-color="#0f1a2b"/>
          </radialGradient>
        </defs>
        <circle class="head" cx="100" cy="95" r="82"/>
        <circle class="face" cx="100" cy="95" r="74" fill="url(#shine)"/>
        <ellipse class="eye" cx="70" cy="85" rx="14" ry="10"/><circle class="pupil" cx="70" cy="85" r="5"/>
        <ellipse class="eye" cx="130" cy="85" rx="14" ry="10"/><circle class="pupil" cx="130" cy="85" r="5"/>
        <rect class="lid" x="56" y="80" width="28" height="10" rx="5" />
        <rect class="lid" x="116" y="80" width="28" height="10" rx="5" />
        <path class="brow" d="M53,70 Q70,58 87,70"/><path class="brow" d="M113,70 Q130,58 147,70"/>
        <ellipse class="frame" cx="70" cy="85" rx="18" ry="12"/><ellipse class="frame" cx="130" cy="85" rx="18" ry="12"/>
        <line class="bridge" x1="88" y1="85" x2="112" y2="85"/>
        <ellipse class="mouth" cx="100" cy="125" rx="18" ry="6"/>
        <path class="shirt" d="M40,180 Q100,150 160,180 L160,210 L40,210 Z"/>
        <path class="collar" d="M75,170 L100,158 L125,170 L100,176 Z"/>
        <polygon class="tie" points="100,176 108,194 100,210 92,194"/>
      </svg>
      <div class="loader" aria-hidden="true"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <p id="live" class="sr-only"></p>
  </main>

<script>
(() => {
  /* ===== Config ===== */
  const CHAT_URL    = location.origin.replace(/\/$/,'') + '/chat';
  const LANG        = 'en-US';
  const WAKE_WORD   = 'hello';      // require “Hello” for every question
  const BEEP_FREQ   = 880, BEEP_MS = 140;
  const PAUSE_MS    = 1200;         // quick pause → finalize
  const MAX_WAIT_MS = 5000;         // safety cap
  const TTS_VOL     = 1.0, TTS_RATE = 0.98, TTS_PITCH = 1.02;

  /* ===== DOM ===== */
  const avatar = document.getElementById('avatar');
  const live   = document.getElementById('live');

  /* ===== Beep (WebAudio + fallback) ===== */
  let audioCtx = null;
  async function ensureAudio(){
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') { try{ await audioCtx.resume(); }catch{} }
  }
  async function beep(freq=BEEP_FREQ, ms=BEEP_MS, vol=0.42){
    let played=false;
    try{
      await ensureAudio();
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.type='sine'; osc.frequency.value=freq; g.gain.value=vol;
      osc.connect(g); g.connect(audioCtx.destination); osc.start(); played=true;
      setTimeout(()=>{ try{osc.stop();}catch{} }, ms);
    }catch(e){}
    if (!played){
      try{
        const el = new Audio('data:audio/wav;base64,UklGRhQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQgAAAAA//8AAP//AAD//wAA//8AAP//AAD//wAA');
        el.volume = 1.0; el.play().catch(()=>{});
      }catch(_){}
    }
  }

  /* ===== SR + TTS ===== */
  const SR     = window.SpeechRecognition || window.webkitSpeechRecognition;
  const hasTTS = 'speechSynthesis' in window;

  let recog=null, speaking=false, listening=false;
  let activated=false, buffer='', idleTimer=null, hardTimer=null;

  function setListening(on){ avatar.classList.toggle('listening', !!on); listening = !!on; }
  function setAsking(on){ avatar.classList.toggle('asking', !!on); }
  function setSpeaking(on){ avatar.classList.toggle('speaking', !!on); speaking = !!on; }

  function stopRecognition(){ try{ recog && recog.stop(); }catch{} setListening(false); }
  function startRecognition(){
    if (!SR || speaking) return;
    try{
      recog = new SR();
      recog.lang = LANG; recog.continuous = true; recog.interimResults = true;
      recog.onstart  = () => setListening(true);
      recog.onend    = () => { setListening(false); if (!speaking) setTimeout(tryStart, 900); };
      recog.onerror  = () => { setListening(false); if (!speaking) setTimeout(tryStart, 1400); };
      recog.onresult = (ev) => {
        if (activated) resetPauseTimers();
        let final = '';
        for (const r of ev.results){ if (r.isFinal) final += (r[0].transcript + ' '); }
        if (final) onFinal(final);
      };
      recog.start();
    }catch(e){ setTimeout(tryStart, 1500); }
  }
  function tryStart(){ if (!speaking) startRecognition(); }

  /* ===== TTS: pick a real voice + retry if first attempt fails ===== */
  let preferredVoice = null;
  function pickVoice(){
    const list = window.speechSynthesis.getVoices();
    if (!list || !list.length) return null;
    const priority = [
      /Google\s+US\s+English/i, /Google\s+UK\s+English/i,
      /Microsoft\s+Aria|Jenny|Guy|Davis/i,
      /Samantha|Alex|Karen|Daniel|Tessa|Moira/i
    ];
    for (const p of priority){ const v = list.find(v => p.test(v.name)); if (v) return v; }
    return list.find(v => /en/i.test(v.lang)) || list[0];
  }
  function ensureVoicesReady(cb){
    if (speechSynthesis.getVoices().length) { cb(); return; }
    speechSynthesis.onvoiceschanged = () => { cb(); };
  }

  function speak(text){
    if (!hasTTS || !text) return;

    const speakOnce = (voiceOverride=null) => new Promise(resolve => {
      try{
        // Resume engine (Safari/Chrome sometimes suspend)
        try{ speechSynthesis.resume(); }catch{}

        stopRecognition(); setSpeaking(true);
        const u = new SpeechSynthesisUtterance(text);
        u.lang = LANG; u.volume = TTS_VOL; u.rate = TTS_RATE; u.pitch = TTS_PITCH;
        u.voice = voiceOverride || preferredVoice || null;

        let started = false;
        const guard = setTimeout(()=>{ if(!started){ try{ speechSynthesis.cancel(); }catch{} resolve(false); }}, 700);

        u.onstart = () => { started = true; clearTimeout(guard); };
        u.onend   = () => { setSpeaking(false); resolve(true); };
        u.onerror = () => { setSpeaking(false); resolve(false); };

        speechSynthesis.cancel();
        speechSynthesis.speak(u);
        live.textContent = text; // a11y only
      }catch(e){ setSpeaking(false); resolve(false); }
    });

    (async () => {
      // Try preferred voice, then any 'en' voice, then default
      const voices = speechSynthesis.getVoices();
      const fallbacks = [
        preferredVoice,
        voices.find(v => /en/i.test(v.lang) && v !== preferredVoice),
        voices[0] || null
      ].filter(Boolean);

      for (const v of fallbacks){
        const ok = await speakOnce(v);
        if (ok) { tryStart(); activated=false; setAsking(false); return; }
      }
      // Last resort: try once more with no voice specified
      const ok = await speakOnce(null);
      tryStart(); activated=false; setAsking(false);
      if (!ok) { console.warn('TTS failed to start; voice/permission issue.'); }
    })();
  }

  async function askGateway(text){
    try{
      const ctrl = new AbortController(); const to = setTimeout(()=>ctrl.abort(), 12000);
      const res = await fetch(CHAT_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text }), signal: ctrl.signal
      });
      clearTimeout(to);
      const data  = await res.json().catch(()=>({reply:''}));
      const reply = (data && data.reply) ? data.reply : '';
      speak(reply || "I couldn't get an answer.");
    }catch(e){ speak('Sorry, I lost the connection.'); }
  }

  function armAsking(){ activated=true; buffer=''; setAsking(true); }
  function disarmAsking(){ activated=false; setAsking(false); clearTimeout(idleTimer); clearTimeout(hardTimer); idleTimer=null; hardTimer=null; }

  function finalize(){
    if (!activated) return;
    const q = buffer.trim();
    disarmAsking();
    if (q) askGateway(q);
  }

  function resetPauseTimers(){
    clearTimeout(idleTimer); clearTimeout(hardTimer);
    idleTimer = setTimeout(finalize, PAUSE_MS);
    hardTimer = setTimeout(finalize, MAX_WAIT_MS);
  }

  function onFinal(finalText){
    const t = finalText.trim();
    if (!t) return;

    if (activated){
      buffer += (buffer ? ' ' : '') + t;
      resetPauseTimers();
      return;
    }

    // Wake word: ALWAYS beep and arm; also unlock audio devices
    const lower = t.toLowerCase();
    const saidHello = lower === WAKE_WORD
      || lower.startsWith(WAKE_WORD+' ')
      || lower.endsWith(' '+WAKE_WORD)
      || lower.includes(' '+WAKE_WORD+' ');
    if (saidHello){
      ensureAudio().then(()=>beep());   // beep + resume audio context
      armAsking();                      // listen for the question now
      resetPauseTimers();               // in case of quick pause
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    ensureVoicesReady(() => { preferredVoice = pickVoice(); });
    tryStart(); // idle listening; each Q requires “Hello”
  });
})();
</script>
</body>
</html>
