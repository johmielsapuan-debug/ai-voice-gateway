<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Voice</title>
  <style>
    :root { --bg:#0b1220; --ring:#60a5fa; --speak:#22c55e; --muted:#90a4b8; }
    html,body { height:100%; margin:0; background:var(--bg); color:#e5e7eb; font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif; }
    .stage { height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; padding:16px; }

    /* Avatar */
    .avatar {
      width:min(40vh, 46vw); aspect-ratio:1/1; position:relative;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,.45));
      animation: breathe 4s ease-in-out infinite;
      user-select:none; -webkit-user-select:none; touch-action:manipulation;
    }
    @keyframes breathe { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-2px) scale(1.01);} }

    /* Rings for states */
    .ring { position:absolute; inset:-10%; border-radius:50%; opacity:0; pointer-events:none; }
    .idle .ring       { opacity:.0; }
    .listening .ring  { opacity:.65; animation:ring 1.4s ease-out infinite; }
    .asking .ring     { opacity:.9;  animation:ringActive .9s ease-out infinite; }
    .speaking .ring   { opacity:.95; animation:speakPulse .6s ease-in-out infinite; }
    @keyframes ring { 0%{box-shadow:0 0 0 0 rgba(96,165,250,.40);} 100%{box-shadow:0 0 0 26px rgba(96,165,250,0);} }
    @keyframes ringActive { 0%{box-shadow:0 0 0 6px rgba(96,165,250,.65);} 100%{box-shadow:0 0 0 14px rgba(96,165,250,0.10);} }
    @keyframes speakPulse { 0%,100%{box-shadow:0 0 0 4px rgba(34,197,94,.45);} 50%{box-shadow:0 0 0 10px rgba(34,197,94,.15);} }

    /* Cartoon avatar */
    svg { width:100%; height:100%; display:block; }
    .head  { fill:#14223a; stroke:#1f2f50; stroke-width:2; }
    .face  { fill:#0f1a2b; }
    .eye   { fill:#e5e7eb; }
    .pupil { fill:#0b1220; }
    .lid   { fill:#0b1220; transform-origin:50% 50%; }
    .blink .lid { animation:blink 6s infinite; }
    @keyframes blink { 0%,97%,100%{transform:scaleY(0);} 98%{transform:scaleY(1);} }
    .frame { stroke:#6aa9ff; stroke-width:3; fill:none; }
    .bridge{ stroke:#6aa9ff; stroke-width:3; }
    .brow  { stroke:#2a3a59; stroke-width:3; stroke-linecap:round; }
    .mouth { fill:#ef4444; transform-origin:50% 60%; }
    .speaking .mouth { animation:talk .22s ease-in-out infinite; }
    @keyframes talk { 0%,100%{transform:scaleY(.5);} 50%{transform:scaleY(1.12);} }
    .shirt { fill:#1b2a46; }
    .collar{ fill:#1d2f53; }
    .tie   { fill:#3b82f6; }

    /* Speaking loader */
    .loader {
      position:absolute; left:50%; bottom:-44px; transform:translateX(-50%);
      display:none; gap:7px; align-items:flex-end;
    }
    .avatar.speaking .loader { display:flex; }
    .dot { width:8px; height:8px; border-radius:50%; background:#22c55e; animation:bounce 900ms infinite ease-in-out; }
    .dot:nth-child(2){ animation-delay:120ms; } .dot:nth-child(3){ animation-delay:240ms; }
    @keyframes bounce { 0%,100%{ transform:translateY(0); opacity:.5; } 50%{ transform:translateY(-8px); opacity:1; } }

    .controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; justify-content:center; }
    button {
      background:#1f2f50; color:#e5e7eb; border:1px solid #2a3a59; border-radius:10px; padding:10px 14px;
      font-weight:600; cursor:pointer;
    }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .hint { color:var(--muted); font-size:.92rem; text-align:center; max-width:680px; }
    .warn { color:#fbbf24; }
    .ok { color:#86efac; }

    .sr-only { position:absolute; clip:rect(0 0 0 0); clip-path:inset(50%); width:1px; height:1px; overflow:hidden; white-space:nowrap; border:0; }
  </style>
</head>
<body>
  <main class="stage" aria-label="Voice assistant">
    <div id="avatar" class="avatar blink idle" aria-live="polite">
      <div class="ring"></div>
      <svg viewBox="0 0 200 220" role="img" aria-hidden="true">
        <defs>
          <radialGradient id="shine" cx="30%" cy="25%" r="70%">
            <stop offset="0%" stop-color="#1c2945"/><stop offset="100%" stop-color="#0f1a2b"/>
          </radialGradient>
        </defs>
        <circle class="head" cx="100" cy="95" r="82"/>
        <circle class="face" cx="100" cy="95" r="74" fill="url(#shine)"/>
        <ellipse class="eye" cx="70" cy="85" rx="14" ry="10"/><circle class="pupil" cx="70" cy="85" r="5"/>
        <ellipse class="eye" cx="130" cy="85" rx="14" ry="10"/><circle class="pupil" cx="130" cy="85" r="5"/>
        <rect class="lid" x="56" y="80" width="28" height="10" rx="5" />
        <rect class="lid" x="116" y="80" width="28" height="10" rx="5" />
        <path class="brow" d="M53,70 Q70,58 87,70"/><path class="brow" d="M113,70 Q130,58 147,70"/>
        <ellipse class="frame" cx="70" cy="85" rx="18" ry="12"/><ellipse class="frame" cx="130" cy="85" rx="18" ry="12"/>
        <line class="bridge" x1="88" y1="85" x2="112" y2="85"/>
        <ellipse class="mouth" cx="100" cy="125" rx="18" ry="6"/>
        <path class="shirt" d="M40,180 Q100,150 160,180 L160,210 L40,210 Z"/>
        <path class="collar" d="M75,170 L100,158 L125,170 L100,176 Z"/>
        <polygon class="tie" points="100,176 108,194 100,210 92,194"/>
      </svg>
      <div class="loader" aria-hidden="true"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <div class="controls">
      <button id="startBtn">Tap to start</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>
    <p class="hint" id="hint">
      Tap, then say <b>Hello</b>. You’ll hear a beep, then ask your question. I’ll answer with audio.
    </p>
    <p id="iosWarn" class="hint warn" style="display:none;">
      Your browser doesn’t support on‑device speech recognition. Try Chrome on Android or use a desktop browser.
    </p>
    <p id="secureWarn" class="hint warn" style="display:none;">
      Mic requires a secure context. Please use <b>HTTPS</b> or <b>localhost</b>.
    </p>
    <p id="status" class="hint ok" style="display:none;"></p>

    <p id="live" class="sr-only"></p>
  </main>

<script>
(() => {
  /* ===== Config ===== */
  const CHAT_URL    = location.origin.replace(/\/$/,'') + '/chat';
  const LANG        = 'en-US';
  const WAKE_WORD   = 'hello';
  const BEEP_FREQ   = 880, BEEP_MS = 140;
  const PAUSE_MS    = 1500;
  const MAX_WAIT_MS = 7000;
  const TTS_VOL     = 1.0, TTS_RATE = 0.98, TTS_PITCH = 1.02;
  const WAKE_COOLDOWN_MS = 3000;

  /* ===== DOM ===== */
  const avatar   = document.getElementById('avatar');
  const startBtn = document.getElementById('startBtn');
  const stopBtn  = document.getElementById('stopBtn');
  const iosWarn  = document.getElementById('iosWarn');
  const secureWarn = document.getElementById('secureWarn');
  const statusEl = document.getElementById('status');
  const live     = document.getElementById('live');

  /* ===== Env checks ===== */
  const SR     = window.SpeechRecognition || window.webkitSpeechRecognition || null;
  const hasTTS = 'speechSynthesis' in window;
  const isIOS  = /iP(ad|hone|od)/i.test(navigator.platform) || (navigator.userAgent.includes('Mac') && 'ontouchend' in document);
  const isiOSWebKit = isIOS && /AppleWebKit/i.test(navigator.userAgent);
  const isSecure = location.protocol === 'https:' || location.hostname === 'localhost';

  if (!isSecure) secureWarn.style.display = 'block';
  if (!SR && isiOSWebKit) iosWarn.style.display = 'block';

  /* ===== Beep (WebAudio + fallback) ===== */
  let audioCtx = null;
  async function ensureAudio(){
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') { try{ await audioCtx.resume(); }catch{} }
  }
  async function beep(freq=BEEP_FREQ, ms=BEEP_MS, vol=0.42){
    let played=false;
    try{
      await ensureAudio();
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.type='sine'; osc.frequency.value=freq; g.gain.value=vol;
      osc.connect(g); g.connect(audioCtx.destination); osc.start(); played=true;
      setTimeout(()=>{ try{osc.stop();}catch{} }, ms);
    }catch(e){}
    if (!played){
      try{
        const el = new Audio('data:audio/wav;base64,UklGRhQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQgAAAAA//8AAP//AAD//wAA//8AAP//AAD//wAA');
        el.volume = 1.0; el.play().catch(()=>{});
      }catch(_){}
    }
  }

  /* ===== State ===== */
  let recog=null, listening=false;
  let state='idle'; // 'idle' | 'armed' | 'speaking'
  let buffer='', idleTimer=null, hardTimer=null, lastWakeTs=0;
  let wakeLocked=false;

  /* ===== UI helpers ===== */
  function setClass(cls){
    avatar.classList.remove('idle','listening','asking','speaking');
    avatar.classList.add(cls);
  }
  function uiToIdle(){ setClass('idle listening'); }
  function uiToArmed(){ setClass('asking'); }
  function uiToSpeaking(){ setClass('speaking'); }

  function showStatus(txt){
    statusEl.textContent = txt;
    statusEl.style.display = 'block';
  }

  /* ===== Recognition ===== */
  function stopRecognition(){
    try{ recog && recog.stop(); }catch{}
    listening=false;
  }
  function startRecognition(){
    if (!SR || state==='speaking') return;
    try{
      recog = new SR();
      recog.lang = LANG;
      recog.continuous = true;
      recog.interimResults = true;
      recog.maxAlternatives = 1;

      recog.onstart = () => {
        listening = true;
        uiToIdle();
        showStatus('Listening… Say “Hello”.');
      };
      recog.onend = () => {
        listening = false;
        if (state!=='speaking') setTimeout(tryStart, 800);
      };
      recog.onerror = (ev) => {
        listening = false;
        showStatus('Mic error. If on iOS Safari, SR is unsupported.');
        if (state!=='speaking') setTimeout(tryStart, 1200);
      };

      // ★ Detect wake from interim (fast beep), but only collect finals into buffer when armed.
      recog.onresult = (ev) => {
        const last = ev.results[ev.results.length - 1];
        const transcript = last[0].transcript || '';

        // Wake detection even on interim
        if (state==='idle' && !wakeLocked && maybeHello(transcript)) {
          tryWake(); // single beep & lock
        }

        // While ARMED, reset timers on any activity and collect FINALS
        if (state==='armed') {
          resetPauseTimers();
          if (last.isFinal) {
            onFinalChunk(transcript);
          }
        } else if (last.isFinal) {
          // If we receive a final "hello" while idle, also wake
          if (!wakeLocked && maybeHello(transcript)) {
            tryWake();
          }
        }
      };

      recog.start();
    }catch(e){
      setTimeout(tryStart, 1200);
    }
  }
  function tryStart(){ if (state!=='speaking') startRecognition(); }

  function normalized(str){
    return (str||'').toLowerCase().replace(/[^a-z\s]/g,' ').replace(/\s+/g,' ').trim();
  }
  function maybeHello(str){
    return /\bhello\b/.test(normalized(str));
  }

  function tryWake(){
    const now = Date.now();
    if (wakeLocked || (now - lastWakeTs) < WAKE_COOLDOWN_MS) return;
    lastWakeTs = now;
    wakeLocked = true;
    state = 'armed';
    buffer = '';
    uiToArmed();
    ensureAudio().then(()=>beep());           // ★ Beep immediately on "Hello"
    resetPauseTimers();
    showStatus('Beep! Now ask your question…');
  }

  function onFinalChunk(text){
    const t = (text||'').trim();
    if (!t) return;
    buffer += (buffer ? ' ' : '') + t;
  }

  /* ===== TTS ===== */
  let preferredVoice=null;
  function pickVoice(){
    const list = speechSynthesis.getVoices();
    if (!list || !list.length) return null;
    const priority = [
      /Google\s+US\s+English/i, /Google\s+UK\s+English/i,
      /Microsoft\s+Aria|Jenny|Guy|Davis/i,
      /Samantha|Alex|Karen|Daniel|Tessa|Moira/i
    ];
    for (const p of priority){ const v = list.find(v => p.test(v.name)); if (v) return v; }
    return list.find(v => /en/i.test(v.lang)) || list[0] || null;
  }
  function warmUpTTS(){
    if (!hasTTS) return;
    try{
      const u = new SpeechSynthesisUtterance('.');
      u.volume=0; u.rate=1; u.pitch=1; u.lang=LANG;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }catch{}
  }
  function ensureVoicesReady(cb){
    if (!hasTTS) { cb(); return; }
    const run=()=>{ preferredVoice = pickVoice(); cb(); };
    if (speechSynthesis.getVoices().length){ run(); return; }
    speechSynthesis.onvoiceschanged = () => run();
    setTimeout(run, 1000);
  }

  async function speak(text){
    if (!hasTTS || !text) { endSessionUnlock(); return; }

    const attempt = (voiceOverride=null) => new Promise(res=>{
      try{
        try{ speechSynthesis.resume(); }catch{}
        stopRecognition();
        state='speaking'; uiToSpeaking();

        const u = new SpeechSynthesisUtterance(text);
        u.lang=LANG; u.volume=TTS_VOL; u.rate=TTS_RATE; u.pitch=TTS_PITCH;
        u.voice = voiceOverride || preferredVoice || null;

        let started=false;
        const guard=setTimeout(()=>{ if(!started){ try{ speechSynthesis.cancel(); }catch{} res(false); }}, 1200);
        u.onstart=()=>{ started=true; clearTimeout(guard); showStatus('Speaking…'); };
        u.onend  =()=>res(true);
        u.onerror=()=>res(false);

        speechSynthesis.cancel();
        speechSynthesis.speak(u);
        live.textContent = text;
      }catch(e){ res(false); }
    });

    const voices = hasTTS ? speechSynthesis.getVoices() : [];
    const order = [preferredVoice, voices.find(v=>/en/i.test(v?.lang) && v!==preferredVoice), voices[0]||null].filter(Boolean);

    let ok=false;
    for (const v of order){ ok = await attempt(v); if (ok) break; }
    if (!ok) ok = await attempt(null);

    endSessionUnlock();
  }

  function endSessionUnlock(){
    wakeLocked=false;
    state='idle'; uiToIdle(); tryStart();
    showStatus('Listening… Say “Hello” for the next question.');
  }

  /* ===== Gateway ===== */
  async function askGateway(text){
    try{
      const ctrl = new AbortController(); const to = setTimeout(()=>ctrl.abort(), 12000);
      const res = await fetch(CHAT_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text }), signal: ctrl.signal
      });
      clearTimeout(to);
      const data  = await res.json().catch(()=>({reply:''}));
      const reply = (data && data.reply) ? data.reply : '';
      if (reply) speak(reply);
      else { wakeLocked=false; state='idle'; uiToIdle(); tryStart(); showStatus('No reply. Listening again.'); }
    }catch(e){
      speak('Sorry, I lost the connection.');
    }
  }

  /* ===== Timing ===== */
  function clearTimers(){ clearTimeout(idleTimer); clearTimeout(hardTimer); idleTimer=null; hardTimer=null; }
  function finalize(){
    if (state!=='armed') return;
    const q = (buffer||'').trim();
    state='idle'; clearTimers(); uiToIdle();
    if (q) { showStatus('Sending your question…'); askGateway(q); }
    else { wakeLocked=false; tryStart(); showStatus('Listening…'); }
  }
  function resetPauseTimers(){
    clearTimers();
    idleTimer = setTimeout(finalize, PAUSE_MS);
    hardTimer = setTimeout(finalize, MAX_WAIT_MS);
  }

  /* ===== Controls ===== */
  async function startAll(){
    // Must be user gesture: unlock audio + TTS
    await ensureAudio();
    warmUpTTS();
    ensureVoicesReady(()=>{});

    // Start SR immediately within the click gesture ★
    if (SR){
      state='idle'; uiToIdle();
      tryStart();
      showStatus('Listening… Say “Hello”.');
    } else {
      showStatus('Speech recognition not available in this browser.');
    }

    startBtn.disabled = true; stopBtn.disabled = false;
  }
  function stopAll(){
    stopRecognition();
    try{ speechSynthesis.cancel(); }catch{}
    clearTimers();
    state='idle'; wakeLocked=false; buffer='';
    uiToIdle();
    startBtn.disabled = false; stopBtn.disabled = true;
    showStatus('Stopped.');
  }
  startBtn.addEventListener('click', startAll, { passive:true });
  stopBtn.addEventListener('click',  stopAll,  { passive:true });

  /* ===== Boot ===== */
  document.addEventListener('DOMContentLoaded', () => {
    setClass('idle');
  });
})();
</script>
</body>
</html>
