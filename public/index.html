<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI Voice Gateway</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body{font:16px/1.5 system-ui, Arial, sans-serif; margin:2rem}

  </head>
  <body>
    <h1>AI Voice Gateway</h1>
    <p>This service proxies WebRTC SDP offers to the AI Realtime API and returns SDP answers.</p>
    <p>POST an SDP offer to <code>/session</code> with <code>Content-Type: application/sdp</code>.</p>
    <p>Requires environment variable: <code>OPENAI_API_KEY</code>.</p>
  </body>
</html>
